# Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space last-window

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No escape delay
set -sg escape-time 0

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc:RGB"

# Unbind default split keys
unbind '"'
unbind %

# Rebind with more ergonomic keys
bind - split-window -v # Horizontal split (top/bottom)
bind | split-window -h # Vertical split (left/right)

# Relaod Config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Allow clipboard copy
set -g set-clipboard on

# Pass terminal title through to iTerm
set -g set-titles on
set -g set-titles-string "#{pane_title}"
setw -g allow-rename on

# Easy pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Mouse resize panes
set -g mouse on

# Allow Shift+Enter to pass through (for Claude Code newline input)
set -s extended-keys on
set -s terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux*:extkeys'

# Remove gap between content and status bar
set -g fill-character ''

# Scrollback buffer
set -g history-limit 10000

# Use vim keybindings in copy mode and command prompt
setw -g mode-keys vi
set -g status-keys vi

# Vim-style visual selection and yank in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ----- VS Code Dark color scheme -----
# bg=#1F1F1F  fg=#D4D4D4  sidebar=#252526
# blue=#569CD6  grey=#808080  highlight=#264F78
# green=#6A9955  red=#F44747  purple=#C586C0

# ----- Base status bar -----
set -g status on
set -g status-interval 5
set -g status-bg "#252526"
set -g status-fg "#D4D4D4"
set -g status-justify centre

# Left: session name + host
set -g status-left-length 40
set -g status-left '#[fg=#D4D4D4,bg=#373737,bold] #S #[fg=#373737,bg=#252526,nobold] #[fg=#D4D4D4]#H '

# Right: time/date
set -g status-right-length 120
set -g status-right '#[fg=#808080]%Y-%m-%d #[fg=#808080]| %H:%M '

# Window tabs
set -g window-status-format ' #[fg=#808080]#I:#W '
set -g window-status-current-format '#[fg=#D4D4D4,bg=#373737,bold] #I:#W #[fg=#373737,bg=#252526,nobold]'

set -g window-status-style "fg=#808080,bg=#252526"
set -g window-status-current-style "fg=#D4D4D4,bg=#373737,bold"

# Pane borders
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#444444"

# Messages / prompts
set -g message-style "fg=#D4D4D4,bg=#373737,bold"

# Copy mode
setw -g mode-style "fg=#000000,bg=#FFFF00"

# Clock & command style
set -g clock-mode-colour "#569CD6"
