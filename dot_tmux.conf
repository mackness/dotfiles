# Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space last-window

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No escape delay
set -sg escape-time 0

# --- Terminal rendering (fixes Claude Code TUI repaint/desync in Ghostty) ---
# Tell tmux the terminal supports 256 color + RGB and synchronized output,
# so Claude Code's atomic frame updates pass through instead of tearing.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:sync"
set -as terminal-features ",*:RGB:sync"
# Let apps emit passthrough escape sequences (synchronized output, OSC, etc.)
set -g allow-passthrough on

# Enable focus events for autoread in Neovim
set -g focus-events on

# Set extended keys format for pi dev
set -g extended-keys-format csi-u

# Unbind default split keys
unbind '"'
unbind %

# Rebind with more ergonomic keys
bind - split-window -v # Horizontal split (top/bottom)
bind | split-window -h # Vertical split (left/right)

# Relaod Config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Allow clipboard copy
set -g set-clipboard on

# Pass terminal title through to iTerm
set -g set-titles on
set -g set-titles-string "#{pane_title}"
setw -g allow-rename off

# Easy pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# New session
bind -r N new-session

# --- sesh: smart session switcher (built-in picker; robust inside a popup) ----
# prefix T : open the sesh picker — handles list/fuzzy/preview/connect internally
bind-key "T" display-popup -w 80% -h 50% -E "sesh picker -i -d"

# prefix L : jump to the last session, back-and-forth
bind-key "L" run-shell "sesh last 2>/dev/null"

# prefix 9 : connect to the git/worktree root of the current pane (.bare layout)
# Uses pane_current_path (resolved at keypress), not $(pwd) at config-load time.
bind-key "9" run-shell "sesh connect --root #{pane_current_path}"

# Mouse resize panes
set -g mouse on

# Allow Shift+Enter to pass through (for Claude Code newline input)
set -s extended-keys on

# Remove gap between content and status bar
set -g fill-character ''

# Scrollback buffer
set -g history-limit 10000

# Use vim keybindings in copy mode and command prompt
setw -g mode-keys vi
set -g status-keys vi

# Vim-style visual selection and yank in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Catppuccin color overrides (vscode.nvim dark palette) ---
# Must be set BEFORE the plugin loads
set -g @thm_bg "#1F1F1F"
set -g @thm_fg "#D4D4D4"
set -g @thm_rosewater "#D7BA7D"
set -g @thm_flamingo "#CE9178"
set -g @thm_pink "#C586C0"
set -g @thm_mauve "#C586C0"
set -g @thm_red "#F44747"
set -g @thm_maroon "#D16969"
set -g @thm_peach "#CE9178"
set -g @thm_yellow "#DCDCAA"
set -g @thm_green "#B5CEA8"
set -g @thm_teal "#4EC9B0"
set -g @thm_sky "#9CDCFE"
set -g @thm_sapphire "#4FC1FF"
set -g @thm_blue "#569CD6"
set -g @thm_lavender "#9CDCFE"
set -g @thm_subtext_1 "#808080"
set -g @thm_subtext_0 "#BBBBBB"
set -g @thm_overlay_2 "#636369"
set -g @thm_overlay_1 "#5A5A5A"
set -g @thm_overlay_0 "#51504F"
set -g @thm_surface_2 "#636369"
set -g @thm_surface_1 "#373737"
set -g @thm_surface_0 "#252526"
set -g @thm_mantle "#252526"
set -g @thm_crust "#222222"

# Add space between window name and number
set -g @catppuccin_window_text "  #W "
set -g @catppuccin_window_current_text "  #W "

# Add gap before the active window's number badge
set -g @catppuccin_window_current_left_separator "  "

# Active window number color (vscLightGreen instead of mauve)
set -g @catppuccin_window_current_number_color "#B5CEA8"

# Uniform pane borders
set -g @catppuccin_pane_border_style "fg=#373737"
set -g @catppuccin_pane_active_border_style "fg=#373737"

# Status left: session name with padding
set -g status-left "[#S]   "
set -g status-left-length 50

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
